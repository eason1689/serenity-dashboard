name: Update Serenity dashboard

on:
  workflow_dispatch:
  schedule:
    # Hourly checks around the US market open window.
    # The script guards by America/New_York time and only acts from 08:30 to 13:00.
    # Use an off-peak minute so GitHub's scheduled runner queue is less likely to drop it.
    - cron: "37 12-18 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-serenity-dashboard
  cancel-in-progress: false

jobs:
  update-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update signals
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: npm run update:signals

      - name: Commit dashboard data
        run: |
          if git diff --quiet -- signals.json; then
            echo "No signal changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals.json
          git commit -m "Update Serenity signals"
          git push
