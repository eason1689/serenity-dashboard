name: Update Serenity dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
    - cron: "30 21 * * 1-5"

permissions:
  contents: write

jobs:
  update-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update signals
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: npm run update:signals

      - name: Commit dashboard data
        run: |
          if git diff --quiet -- signals.json; then
            echo "No signal changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals.json
          git commit -m "Update Serenity signals"
          git push
