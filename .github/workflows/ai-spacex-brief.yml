name: AI stocks and SpaceX daily brief

on:
  workflow_dispatch:
  schedule:
    # Beijing 08:17/08:47/09:17 every day. Backup slots reduce missed scheduled runs.
    - cron: "17 0 * * *"
    - cron: "47 0 * * *"
    - cron: "17 1 * * *"

permissions:
  contents: read

concurrency:
  group: ai-spacex-daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate and push daily brief
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: npm run brief:ai-spacex
