name: AI stocks and SpaceX daily brief

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0 * * *"

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate and push daily brief
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: npm run brief:ai-spacex
