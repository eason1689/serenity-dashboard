name: Backfill first mention prices

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Backfill first mention prices
        run: npm run backfill:first-mentions

      - name: Commit updated signals
        run: |
          if git diff --quiet signals.json; then
            echo "No signals.json changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add signals.json
            git commit -m "Backfill Serenity first mention prices"
            git push
          fi
